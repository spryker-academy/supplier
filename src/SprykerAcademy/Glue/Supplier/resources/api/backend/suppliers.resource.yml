resource:
    name: Suppliers
    shortName: Supplier
    description: Supplier management API for backend operations

    provider: SprykerAcademy\Glue\Supplier\Api\Backend\Provider\SuppliersBackendProvider

    paginationEnabled: true
    paginationItemsPerPage: 10

    operations:
        - type: Get
        - type: GetCollection

    properties:
        idSupplier:
            type: int
            description: The unique supplier identifier
            identifier: true
        name:
            type: string
            description: Supplier name
        description:
            type: string
            description: Supplier description
        status:
            type: int
            description: Supplier status where 1 is active and 0 is inactive
        email:
            type: string
            description: Supplier email
        phone:
            type: string
            description: Supplier phone
